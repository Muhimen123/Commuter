<style>

        .star-rating .material-symbols-outlined:hover,
        .star-rating .material-symbols-outlined:hover ~ .material-symbols-outlined {

            color: #beab4e; /* tertiary-container / gold */
        }

<div>

</div>
</div>

</div>

<button class="flex-1 py-3 px-2 rounded-lg border border-outline-variant text-on-surface font-label-lg text-label-lg hover:bg-surface-variant/50 transition-colors">Avoid</button>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>

            </button>

<script>
        // Simple star rating interactivity for demonstration
        document.querySelectorAll('.star-rating').forEach(ratingGroup => {
            const stars = Array.from(ratingGroup.querySelectorAll('span'));
            // Reverse array because CSS flex-direction: row-reverse is used for hover effects
            stars.reverse().forEach((star, index) => {
                star.addEventListener('click', () => {
                    stars.forEach((s, i) => {
                        if (i <= index) {
                            s.classList.add('active');
                        } else {
                            s.classList.remove('active');
                        }
                    });
                });
            });
        });
    </script>
